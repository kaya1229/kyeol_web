<!DOCTYPE html>
<html>
<head>
  <base href="/kyeol_web/">

  <meta charset="UTF-8">
  <title>Kyeol Discipline App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="loading" style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#FAF9F6;">
    <p style="font-family:sans-serif; color:black;">앱을 불러오는 중입니다...</p>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
